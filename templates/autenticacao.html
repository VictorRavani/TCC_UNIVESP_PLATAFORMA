{% extends "base.html" %}

{% block content %}

<body class="login-page">

    <div class="container-fluid p-0">

        <div class="bg-login d-flex flex-column justify-content-center align-items-center text-center">

            <div class="login-card col-md-5 col-lg-4 p-5">

                <h4 class="pb-3">Login</h4>

                <form id="loginForm">

                    <div class="form-group pb-3">
                        <input type="text" class="form-control form-control-lg"
                               id="user" placeholder="Usuário" required>
                    </div>

                    <div class="form-group pb-3 position-relative">

                        <input type="password"
                            class="form-control form-control-lg pr-5"
                            id="password"
                            placeholder="Senha"
                            required>

                        <i class="fas fa-eye"
                        id="toggleSenha"
                        style="
                                position:absolute;
                                right:20px;
                                top:40%;
                                transform:translateY(-50%);
                                cursor:pointer;
                                color:#545b61;
                        ">
                        </i>

                    </div>

                    <button type="submit"
                            class="btn btn-info btn-lg w-100 font-weight-bold mt-2">
                        Entrar
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

{% endblock %}

{% block scripts %}

<script>
    // $(document).ready garante que o código só rode quando o HTML estiver 100% pronto
    jQuery(document).ready(function($) {
        console.log("DOM pronto. Anexando evento de submit...");

        $('#loginForm').on('submit', function (e) {
            console.log("Evento submit capturado com sucesso!");
            e.preventDefault();

            var userData = { 
                'user': $('#user').val(), 
                'password': $('#password').val() 
            };

            $.ajax({
                url: '/login',
                type: 'POST',
                data: userData,
                success: function (response) {
                    console.log("Resposta do servidor:", response);
                    if (response['Login']) {
                        window.location.reload();
                    } else {
                        alert('Usuário ou senha incorretos');
                    }
                },
                error: function(xhr, status, error) {
                    console.error("Erro na requisição AJAX:", error);
                    alert("Erro ao conectar com o servidor.");
                }
            });
        });
    });
</script>

{% endblock %}
